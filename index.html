    </div>
    <div class="actions">
      ${isActive ? `<a class="btn small ok" href="${waLink(x.whatsapp,'أهلاً 👋\nمعاك فريق CareerK.\nاستلمنا طلبك لاستعادة كلمة السر، وحقنبعتلك كود التحقق دلوقتي.\nلو مش أنت اللي طلبت، تجاهل الرسالة.\n\n— فريق CareerK · مجتمع الصيادلة والصيدليات في مصر')}" target="_blank">📱 راسل واتساب</a>` : ''}
      <button class="btn small danger" onclick="deleteRow(event,'otp_codes','${x.id}')">حذف</button>
    </div>
  </div></div>`;
}

// ============ PASSWORD RESET REQUESTS TAB (legacy v64 flow) ============
function renderResets(rows){
  const pending = rows.filter(x => x.status === 'pending');
  const html = rows.length ? rows.map(resetRow).join('') : '<div class="empty">لا توجد طلبات استعادة كلمة سر</div>';
  $('rows').innerHTML = `<div class="tools-grid">
    <div class="tool-card">
      <h4>🔄 طلبات استعادة معلقة: ${pending.length}</h4>
      <p>هنا بتظهر طلبات المستخدمين اللي رفعوا صور إثبات لاستعادة كلمة السر (نظام قديم قبل الـ WhatsApp OTP). راجع الصورة والاسم واقبل/ارفض.</p>
    </div>
  </div>${html}`;
}
function resetRow(x){
  const chipStatus = x.status === 'pending' ? '<span class="chip pending">⏳ في الانتظار</span>' :
                     x.status === 'approved' ? '<span class="chip verified">✅ مقبول</span>' :
                     '<span class="chip rejected">❌ مرفوض</span>';
  return `<div class="row ${x.status==='pending'?'row-pending':''}"><div class="row-main">
    <div class="admin-person">
      ${adminAvatar(x.full_name_provided, x.verification_document_url)}
      <div>
        <h4 class="title">${esc(x.full_name_provided||'بدون اسم')}</h4>
        <div class="meta">
          ${chipStatus}
          <span class="chip">📱 ${esc(x.whatsapp)}</span>
          <span class="chip">${esc(x.verification_document_type||'')}</span>
          <span class="chip">${ago(x.created_at)}</span>
        </div>
      </div>
    </div>
    <div class="actions">
      ${x.verification_document_url?`<a class="btn small" href="${esc(x.verification_document_url)}" target="_blank">📄 الصورة</a>`:''}
      <a class="btn small" target="_blank" href="${waLink(x.whatsapp, null, x.full_name_provided)}">💬 واتساب</a>
      ${x.status==='pending'?`<button class="btn small ok" onclick="approveReset(event,'${x.id}')">✅ قبول</button>
      <button class="btn small danger" onclick="rejectReset(event,'${x.id}')">❌ رفض</button>`:''}
    </div>
  </div></div>`;
}
async function approveReset(e,id){
  if(!confirm('قبول الطلب؟\n\nهيتم تغيير كلمة السر للجديدة وإشعار المستخدم في الجرس.'))return;
  const btn=e.currentTarget,old=btn.textContent;btn.disabled=true;btn.textContent='جارِ...';
  try{const r=await sb.rpc('admin_approve_password_reset',{request_id:id});if(r.error)throw r.error;toast('تم قبول الطلب وتغيير كلمة السر');await loadAll()}
  catch(err){toast(friendly(err),'error')}
  finally{btn.disabled=false;btn.textContent=old}
}
async function rejectReset(e,id){
  const reason=prompt('سبب الرفض؟','بيانات غير مطابقة')||'بيانات غير مطابقة';
  const btn=e.currentTarget,old=btn.textContent;btn.disabled=true;btn.textContent='جارِ...';
  try{const r=await sb.rpc('admin_reject_password_reset',{request_id:id,reason});if(r.error)throw r.error;toast('تم رفض الطلب');await loadAll()}
  catch(err){toast(friendly(err),'error')}
  finally{btn.disabled=false;btn.textContent=old}
}

// ============ NOTIFICATIONS TAB ============
function renderNotifications(rows){
  const html = rows.length ? rows.map(notifRow).join('') : '<div class="empty">لا توجد إشعارات مُرسلة</div>';
  $('rows').innerHTML = `<div class="tools-grid">
    <div class="tool-card">
      <h4>🔔 إرسال إشعار لمستخدم</h4>
      <p>يظهر الإشعار في جرس المستخدم داخل الموقع. مفيد للتنبيهات الفردية أو الشكاوى.</p>
      <div class="field"><label class="label">رقم واتساب المستخدم</label><input class="input" id="notifPhone" placeholder="مثال: 2010xxxxxxx"></div>
      <div class="field"><label class="label">العنوان</label><input class="input" id="notifTitle" placeholder="مثال: 📩 رد على شكوتك"></div>
      <div class="field"><label class="label">النص</label><textarea class="input" id="notifBody" rows="3" placeholder="نص الإشعار..."></textarea></div>
      <div class="tool-actions"><button class="btn primary" onclick="sendNotifByPhone(event)">📤 إرسال</button></div>
    </div>
    <div class="tool-card">
      <h4>📢 إشعار جماعي</h4>
      <p>يرسل الإشعار لكل مستخدمي الموقع (استخدم بحذر — للتحديثات الكبيرة فقط).</p>
      <div class="field"><label class="label">العنوان</label><input class="input" id="broadcastTitle" placeholder="مثال: 🎉 ميزة جديدة"></div>
      <div class="field"><label class="label">النص</label><textarea class="input" id="broadcastBody" rows="3" placeholder="نص الإشعار الجماعي..."></textarea></div>
      <div class="tool-actions"><button class="btn danger" onclick="sendBroadcast(event)">📢 إرسال للكل</button></div>
    </div>
  </div>${html}`;
}
function notifRow(x){
  return `<div class="row"><div class="row-main"><div>
    <h4 class="title">${esc(x.title||'بدون عنوان')}</h4>
    <div class="meta">
      <span class="chip ${x.read_at?'green':'blue'}">${x.read_at?'مقروء':'غير مقروء'}</span>
      <span class="chip">${ago(x.created_at)}</span>
    </div>
  </div><div class="actions">
    <button class="btn small danger" onclick="deleteRow(event,'notifications','${x.id}')">حذف</button>
  </div></div>${x.body?`<p class="desc">${esc(x.body)}</p>`:''}</div>`;
}
async function sendNotifByPhone(e){
  const phone=($('notifPhone')?.value||'').trim();
  const title=($('notifTitle')?.value||'').trim();
  const body=($('notifBody')?.value||'').trim();
  if(!phone||!title||!body){toast('اكتب الرقم والعنوان والنص','error');return}
  const btn=e.currentTarget,old=btn.textContent;btn.disabled=true;btn.textContent='جارِ...';
  try{
    const p=await sb.from('pharmacists').select('user_id').eq('whatsapp',normalizeWa(phone)).maybeSingle();
    if(p.error)throw p.error;
    if(!p.data?.user_id)throw new Error('مفيش حساب بالرقم ده');
    await notifyUser(p.data.user_id,title,body);
    toast('تم إرسال الإشعار');
    $('notifPhone').value='';$('notifTitle').value='';$('notifBody').value='';
    await loadRows();
  }catch(err){toast(friendly(err),'error')}
  finally{btn.disabled=false;btn.textContent=old}
}
async function sendBroadcast(e){
  const title=($('broadcastTitle')?.value||'').trim();
  const body=($('broadcastBody')?.value||'').trim();
  if(!title||!body){toast('اكتب العنوان والنص','error');return}
  if(!confirm('إرسال إشعار لكل المستخدمين؟\n\nمن الأفضل استخدامها للتحديثات المهمة فقط.'))return;
  const btn=e.currentTarget,old=btn.textContent;btn.disabled=true;btn.textContent='جارِ...';
  try{
    const p=await sb.from('pharmacists').select('user_id');
    if(p.error)throw p.error;
    const users=(p.data||[]).filter(x=>x.user_id).map(x=>({user_id:x.user_id,title,body}));
    if(!users.length)throw new Error('مفيش مستخدمين');
    const r=await sb.from('notifications').insert(users);
    if(r.error)throw r.error;
    toast('تم إرسال '+users.length+' إشعار');
    $('broadcastTitle').value='';$('broadcastBody').value='';
    await loadRows();
  }catch(err){toast(friendly(err),'error')}
  finally{btn.disabled=false;btn.textContent=old}
}

// ============ CONTACT NUMBERS TAB ============
// Admin can add / edit / disable WhatsApp support lines that appear in the
// user site's "شكاوى ومقترحات" section. Requires the contact_numbers table
// (see contact-numbers-setup.sql).
function renderContacts(rows){
  const active = rows.filter(x => x.is_active);
  const list = rows.length ? rows.map(contactRow).join('') : '<div class="empty">لا توجد أرقام. أضف أول رقم من الفورم فوق.</div>';
  $('rows').innerHTML = `<div class="tools-grid">
    <div class="tool-card">
      <h4>📞 إضافة رقم تواصل جديد</h4>
      <div class="field"><label class="label">الرقم</label><input class="input" id="newContactPhone" placeholder="01xxxxxxxxx"></div>
      <div class="field"><label class="label">العنوان</label><input class="input" id="newContactLabel" placeholder="مثال: شكاوى ومقترحات"></div>
      <div class="field"><label class="label">نص الرسالة الجاهزة</label><input class="input" id="newContactMsg" placeholder="CareerK - عندي شكوى:"></div>
      <div class="tool-actions"><button class="btn primary" onclick="addContactNumber(event)">➕ إضافة</button></div>
    </div>
    <div class="tool-card">
      <h4>📊 الحالة</h4>
      <p><b>${active.length}</b> نشط من أصل <b>${rows.length}</b></p>
    </div>
  </div>${list}`;
}
function contactRow(x){
  const statusChip = x.is_active
    ? '<span class="chip verified">✅ نشط</span>'
    : '<span class="chip rejected">⏸️ معطّل</span>';
  return `<div class="row ${x.is_active?'':'row-inactive'}"><div class="row-main">
    <div class="admin-person">
      <span class="admin-avatar">💬</span>
      <div>
        <h4 class="title">${esc(x.label||'بدون عنوان')}</h4>
        <div class="meta">
          ${statusChip}
          <span class="chip">📱 ${esc(x.phone)}</span>
          <span class="chip">ترتيب: ${x.display_order||0}</span>
          <span class="chip">${ago(x.created_at)}</span>
        </div>
        ${x.message_template?`<p class="desc">📝 ${esc(x.message_template)}</p>`:''}
      </div>
    </div>
    <div class="actions">
      ${x.is_active
        ? `<button class="btn small danger" onclick="toggleContactActive(event,'${x.id}',false)">⏸️ تعطيل</button>`
        : `<button class="btn small ok" onclick="toggleContactActive(event,'${x.id}',true)">▶️ تفعيل</button>`}
      <button class="btn small" onclick="editContactNumber(event,'${x.id}','${esc(x.phone)}','${esc(x.label||'')}','${esc((x.message_template||'').replace(/'/g,"\\'"))}',${x.display_order||0})">✏️ تعديل</button>
      <button class="btn small danger" onclick="deleteRow(event,'contact_numbers','${x.id}')">🗑️ حذف</button>
    </div>
  </div></div>`;
}
async function addContactNumber(e){
  const phone=($('newContactPhone')?.value||'').trim();
  const label=($('newContactLabel')?.value||'').trim() || 'شكاوى ومقترحات';
  const msg=($('newContactMsg')?.value||'').trim() || 'CareerK - عندي شكوى/مقترح:';
  if(!phone){toast('اكتب رقم الواتساب','error');return}
  if(!/^0?1[0125]\d{8}$/.test(phone.replace(/\s/g,''))){toast('الرقم مش صحيح (لازم يبدأ بـ 010/011/012/015 وطوله 11 رقم)','error');return}
  const btn=e.currentTarget,old=btn.textContent;btn.disabled=true;btn.textContent='جارِ...';
  try{
    // Auto-assign display_order = max + 1 so new numbers appear last
    const maxR = await sb.from('contact_numbers').select('display_order').order('display_order',{ascending:false}).limit(1);
    const nextOrder = ((maxR?.data?.[0]?.display_order) ?? -1) + 1;
    const r=await sb.from('contact_numbers').insert({phone, label, message_template:msg, display_order:nextOrder, is_active:true});
    if(r.error)throw r.error;
    toast('تم إضافة الرقم');
    $('newContactPhone').value='';$('newContactLabel').value='';$('newContactMsg').value='';
    await loadAll();
  }catch(err){toast(friendly(err),'error')}
  finally{btn.disabled=false;btn.textContent=old}
}
async function toggleContactActive(e,id,active){
  const btn=e.currentTarget,old=btn.textContent;btn.disabled=true;btn.textContent='جارِ...';
  try{
    const r=await sb.from('contact_numbers').update({is_active:active,updated_at:new Date().toISOString()}).eq('id',id);
    if(r.error)throw r.error;
    toast(active?'تم التفعيل':'تم التعطيل');
    await loadAll();
  }catch(err){toast(friendly(err),'error')}
  finally{btn.disabled=false;btn.textContent=old}
}
async function editContactNumber(e,id,phone,label,msg,order){
  const newPhone = prompt('رقم الواتساب:', phone);
  if (newPhone === null) return;
  const newLabel = prompt('العنوان:', label) || label;
  const newMsg = prompt('نص الرسالة الجاهزة:', msg) || msg;
  const newOrder = parseInt(prompt('ترتيب العرض (٠ = الأول):', String(order))) || 0;
  if (!/^0?1[0125]\d{8}$/.test(newPhone.replace(/\s/g,''))){toast('الرقم مش صحيح','error');return}
  const btn=e.currentTarget,old=btn.textContent;btn.disabled=true;btn.textContent='جارِ...';
  try{
    const r=await sb.from('contact_numbers').update({
      phone:newPhone.trim(),
      label:newLabel.trim(),
      message_template:newMsg.trim(),
      display_order:newOrder,
      updated_at:new Date().toISOString()
    }).eq('id',id);
    if(r.error)throw r.error;
    toast('تم التحديث');
    await loadAll();
  }catch(err){toast(friendly(err),'error')}
  finally{btn.disabled=false;btn.textContent=old}
}
async function adminBlockPhone(e){const phone=($('banPhone')?.value||'').trim();const reason=($('banReason')?.value||'').trim();if(!phone){toast('اكتب رقم الواتساب','error');return}const btn=e.currentTarget,old=btn.textContent;btn.disabled=true;btn.textContent='جارِ...';try{const r=await sb.rpc('admin_block_phone',{target_phone:phone,reason_text:reason||'حظر من الإدارة'});if(r.error)throw r.error;toast('تم حظر الرقم');await loadRows()}catch(err){toast(friendly(err)+' - شغّل SQL v34','error')}finally{btn.disabled=false;btn.textContent=old}}
async function adminUnblockPhone(e){const phone=($('banPhone')?.value||'').trim();if(!phone){toast('اكتب رقم الواتساب','error');return}await adminUnblockCore(e.currentTarget,phone)}
async function adminUnblockExisting(e,phone){await adminUnblockCore(e.currentTarget,phone)}
async function adminUnblockCore(btn,phone){const old=btn.textContent;btn.disabled=true;btn.textContent='جارِ...';try{const r=await sb.rpc('admin_unblock_phone',{target_phone:phone});if(r.error)throw r.error;toast('تم فك الحظر');await loadRows()}catch(err){toast(friendly(err)+' - شغّل SQL v34','error')}finally{btn.disabled=false;btn.textContent=old}}
async function adminResetPassword(e){const phone=($('resetPhone')?.value||'').trim();const pass=($('resetPass')?.value||'').trim();if(!phone||!pass){toast('اكتب الرقم والباسورد الجديد','error');return}if(pass.length<6){toast('الباسورد لازم ٦ حروف/أرقام على الأقل','error');return}const btn=e.currentTarget,old=btn.textContent;btn.disabled=true;btn.textContent='جارِ...';try{const r=await sb.rpc('admin_reset_password_by_phone',{target_phone:phone,new_password:pass});if(r.error)throw r.error;toast('تم تغيير الباسورد');$('resetPass').value=''}catch(err){toast(friendly(err)+' - شغّل SQL v34','error')}finally{btn.disabled=false;btn.textContent=old}}

function openItem(type,id){const path=type==='job'?'https://careerk.net/#job-'+id:'https://careerk.net/#sale-'+id;window.open(path,'_blank')}

const SITE_URL='https://careerk.net/';
function bindOpenSite(){
  const btn=$('openSiteBtn');
  if(!btn)return;
  btn.href=SITE_URL;
  btn.addEventListener('click',function(ev){
    ev.preventDefault();
    try{
      const opened=window.open(SITE_URL,'_blank','noopener');
      if(!opened) window.location.href=SITE_URL;
    }catch(e){
      window.location.href=SITE_URL;
    }
  });
}
bindOpenSite();
init();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js?v=61').catch(() => {});
  });
}
