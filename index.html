/* ============ COMPACT MODE โ less scrolling, smaller controls ============ */
.stats{grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px}
.stat{padding:7px 9px;min-height:52px;border-radius:12px}
.stat span{font-size:10.5px;font-weight:800}
.stat b{font-size:19px;line-height:1}
.hero{padding:12px 14px;margin-bottom:8px;border-radius:16px}
.hero h2{font-size:19px}
.hero p{font-size:12.5px;line-height:1.45}
.hero .btn{min-height:32px;padding:6px 12px;font-size:12px}
/* Row and action buttons โ smaller, denser */
.row{padding:9px 10px;gap:6px;border-radius:14px}
.row-main{gap:8px}
.title{font-size:14.5px;margin:0 0 3px;line-height:1.3}
.meta{gap:4px}
.chip{padding:3px 7px;font-size:10px;font-weight:800}
.actions{gap:4px}
.actions .btn.small{padding:5px 8px;font-size:10.5px;min-height:28px;border-radius:999px}
.actions .btn{padding:5px 9px;font-size:11px;min-height:28px}
.desc{font-size:11.5px;line-height:1.5;font-weight:600}
/* Panel head + search */
.panel-head{padding:9px 10px;gap:6px}
.panel-head h3{font-size:17px}
.search{padding:8px 10px;font-size:12.5px}
.filter-chip{padding:6px 10px;font-size:11px}
/* Content spacing */
.content{gap:8px}
.list{padding:8px;gap:6px}
/* Tools grid (used in notifications, contacts, otps tabs) */
.tool-card{padding:10px 12px}
.tool-card h4{font-size:14px;margin:0 0 6px}
.tool-card p{font-size:12px;line-height:1.5;margin:0 0 8px}
.tool-card .field{margin-bottom:8px}
.tool-card .label{font-size:12px;margin-bottom:4px}
.tool-card .input{padding:8px 10px;font-size:12.5px;border-radius:11px}
.tool-actions .btn{padding:7px 12px;font-size:12px;min-height:34px}
/* Mobile: even tighter */

  .top-actions .btn{padding:6px 10px;font-size:11.5px;min-height:32px}
}
/* Collapsible tool sections โ anything wrapped in <details class="tool-collapse"> */
details.tool-collapse{background:linear-gradient(180deg,#fffdf7,#fff8ec);border:1px solid var(--line);border-radius:14px;padding:0;margin-bottom:8px;overflow:hidden}
